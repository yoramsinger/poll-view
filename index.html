<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מעקב סקרים – כנסת ישראל</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b27;
      --surface2:  #1d2337;
      --border:    #2d3a56;
      --text:      #cdd5e0;
      --muted:     #6b7898;
      --accent:    #4a8ecc;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      direction: rtl;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 1.1rem; font-weight: 600; color: #7eb8f7; }
    .header-meta { font-size: 0.72rem; color: var(--muted); }

    /* ── Filters ── */
    .filters {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 20px 10px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .filter-section { flex: 1; min-width: 160px; }

    .filter-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }
    .filter-header h3 {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .btn-xs {
      font-size: 0.62rem;
      padding: 1px 5px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }
    .btn-xs:hover { background: var(--surface2); color: var(--text); }
    .btn-avg.active { background: rgba(74,142,204,0.22); color: var(--accent) !important; border-color: var(--accent) !important; }

    .chips { display: flex; flex-wrap: wrap; gap: 4px; }

    .chip {
      padding: 2px 9px;
      border-radius: 12px;
      font-size: 0.73rem;
      cursor: pointer;
      border: 1.5px solid currentColor;
      background: transparent;
      color: var(--muted);
      transition: all 0.13s;
      user-select: none;
      white-space: nowrap;
    }
    .chip:hover { filter: brightness(1.3); }
    .chip.active { color: #fff !important; font-weight: 500; }

    /* ── Chart Wrapper ── */
    .chart-wrap {
      flex: 1;
      position: relative;
      padding: 14px 18px 10px;
      min-height: 0;
    }
    #chart { display: none; width: 100% !important; height: 100% !important; }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.88rem;
      pointer-events: none;
    }
    .overlay.hidden { display: none; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Zoom ── */
    #zoom-select {
      position: absolute;
      pointer-events: none;
      display: none;
      background: rgba(74,142,204,0.12);
      border-left:  1.5px solid rgba(74,142,204,0.55);
      border-right: 1.5px solid rgba(74,142,204,0.55);
    }
    #zoom-tip {
      position: absolute;
      pointer-events: none;
      display: none;
      background: rgba(10,13,22,0.92);
      border: 1px solid #2d3a56;
      color: #cdd5e0;
      font-size: 0.76rem;
      padding: 3px 10px;
      border-radius: 4px;
      white-space: nowrap;
      z-index: 10;
    }
    #btn-reset-zoom { display: none; color: var(--accent) !important; border-color: var(--accent) !important; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <span style="font-size:1.2rem">📊</span>
    <h1>מעקב סקרים – כנסת ישראל</h1>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="btn-xs" id="btn-reset-zoom" onclick="resetZoom()">↺ איפוס זום</button>
    <span class="header-meta" id="badge"></span>
  </div>
</div>

<!-- Filters -->
<div class="filters">
  <div class="filter-section">
    <div class="filter-header">
      <h3>מפלגות</h3>
      <button class="btn-xs" onclick="selectAll('party')">הכל</button>
      <button class="btn-xs" onclick="deselectAll('party')">נקה</button>
    </div>
    <div class="chips" id="party-chips"></div>
  </div>

  <div class="filter-section" style="max-width:420px">
    <div class="filter-header">
      <h3>סוקרים</h3>
      <button class="btn-xs" onclick="selectAll('pollster')">הכל</button>
      <button class="btn-xs" onclick="deselectAll('pollster')">נקה</button>
      <button class="btn-xs btn-avg" id="btn-weekly-avg" onclick="toggleWeeklyAvg()">⌀ ממוצע שבועי</button>
    </div>
    <div class="chips" id="pollster-chips"></div>
  </div>
</div>

<!-- Chart -->
<div class="chart-wrap">
  <div class="overlay" id="loading">טוען נתונים...</div>
  <div class="overlay hidden" id="no-data">אין נתונים — בחרו מפלגות וסוקרים</div>
  <div id="zoom-select"></div>
  <div id="zoom-tip"></div>
  <canvas id="chart"></canvas>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const PARTIES = [
  'הליכוד','יהדות התורה','ש״ס','כחול לבן','יש עתיד',
  'חדש תע״ל','ישראל ביתנו','הדמוקרטים','הציונות הדתית',
  'רע״מ','בל״ד','עוצמה יהודית','ביחד (בנט ולפיד)',
  'ישר!','המילואימניקים','רשימה ערבית מאוחדת'
];

// Debug flag - set to true to enable console debugging
const DEBUG_MODE = true;

const PARTY_COLORS = {
  'הליכוד':              '#1565C0',
  'יהדות התורה':         '#6D4C41',
  'ש״ס':                 '#F9A825',
  'כחול לבן':            '#42A5F5',
  'יש עתיד':             '#EF6C00',
  'חדש תע״ל':            '#C62828',
  'ישראל ביתנו':         '#546E7A',
  'הדמוקרטים':           '#AD1457',
  'הציונות הדתית':       '#2E7D32',
  'רע״מ':                '#1B5E20',
  'בל״ד':                '#4527A0',
  'עוצמה יהודית':        '#B71C1C',
  'ביחד (בנט ולפיד)':    '#00695C',
  'ישר!':                '#0277BD',
  'המילואימניקים':       '#827717',
  'רשימה ערבית מאוחדת':  '#37474F'
};

const DASH_PATTERNS = [
  [],
  [8, 4],
  [3, 3],
  [12, 4, 3, 4],
  [4, 8],
  [8, 4, 2, 4],
  [16, 4],
  [6, 2]
];

// Default parties shown on load
const DEFAULT_PARTIES = new Set([
  'הליכוד','ביחד (בנט ולפיד)','ישר!','ש״ס',
  'יהדות התורה','עוצמה יהודית','ישראל ביתנו','הציונות הדתית'
]);

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let allData        = [];
let allPollsters   = [];
let pollsterDash   = {};
let selectedParties   = new Set();
let selectedPollsters = new Set();
let chartInst      = null;
let hoveredIdx     = -1;
let hoverAbort     = null;
let pinnedIdx      = -1; // Index of the pinned dataset
let weeklyAvgMode  = false;
let zoomActive     = false;

// Debug function to log messages when DEBUG_MODE is enabled
function debugLog(message) {
  if (DEBUG_MODE) {
    console.log('[PIN MODE DEBUG]', message);
  }
}

// ─────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────
function hex2rgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ─────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────
function loadCSV() {
  return new Promise((resolve, reject) => {
    // Try to load from polls.csv directly
    Papa.parse('polls.csv', {
      download: true,
      header: false,
      skipEmptyLines: true,
      complete: r => resolve(r.data),
      error: e => {
        console.error('Failed to load CSV from polls.csv:', e);
        // If we're in a local environment and can't access the file, 
        // provide a more helpful message but don't reject
        console.log('Note: Running locally without web server. The application will work properly when deployed to GitHub Pages.');
        // Return empty data to prevent complete failure
        resolve([]);
      }
    });
  });
}

function parseRows(rows) {
  return rows.slice(1)
    .map(row => {
      const pollster = (row[4] || '').trim();
      const date     = (row[1] || '').trim();
      if (!date || !pollster) return null;

      const mandates = {};
      PARTIES.forEach((p, i) => {
        // Handle potential undefined or null values in CSV
        let raw = row[6 + i];
        if (raw === undefined || raw === null) {
          raw = '';
        } else {
          raw = raw.toString().trim();
        }
        const v   = raw === '' ? NaN : parseInt(raw, 10);
        mandates[p] = isNaN(v) ? null : v;
      });

      return {
        id:          row[0],
        date,
        displayDate: row[2],
        media:       '',
        pollster,
        mandates
      };
    })
    .filter(Boolean);
}

// ─────────────────────────────────────────────
//  FILTER UI
// ─────────────────────────────────────────────
function renderPartyChips() {
  const el = document.getElementById('party-chips');
  el.innerHTML = '';
  PARTIES.forEach(party => {
    const color  = PARTY_COLORS[party];
    const active = selectedParties.has(party);
    const chip   = document.createElement('button');
    chip.className   = 'chip' + (active ? ' active' : '');
    chip.textContent = party;
    chip.style.color       = color;
    chip.style.borderColor = color;
    if (active) chip.style.background = hex2rgba(color, 0.22);
    chip.onclick = () => {
      if (selectedParties.has(party)) {
        selectedParties.delete(party);
        chip.classList.remove('active');
        chip.style.background = '';
      } else {
        selectedParties.add(party);
        chip.classList.add('active');
        chip.style.background = hex2rgba(color, 0.22);
      }
      rebuildChart();
    };
    el.appendChild(chip);
  });
}

function renderPollsterChips() {
  const el = document.getElementById('pollster-chips');
  el.innerHTML = '';
  allPollsters.forEach(pollster => {
    const active = selectedPollsters.has(pollster);
    const chip   = document.createElement('button');
    chip.className   = 'chip' + (active ? ' active' : '');
    chip.textContent = pollster;
    chip.style.color       = '#4a8ecc';
    chip.style.borderColor = '#4a8ecc';
    if (active) chip.style.background = 'rgba(74,142,204,0.18)';
    chip.onclick = () => {
      if (selectedPollsters.has(pollster)) {
        selectedPollsters.delete(pollster);
        chip.classList.remove('active');
        chip.style.background = '';
      } else {
        selectedPollsters.add(pollster);
        chip.classList.add('active');
        chip.style.background = 'rgba(74,142,204,0.18)';
      }
      rebuildChart();
    };
    el.appendChild(chip);
  });
}

function selectAll(type) {
  if (type === 'party')    { PARTIES.forEach(p => selectedParties.add(p));      renderPartyChips(); }
  else                     { allPollsters.forEach(p => selectedPollsters.add(p)); renderPollsterChips(); }
  rebuildChart();
}

function deselectAll(type) {
  if (type === 'party') { selectedParties.clear(); renderPartyChips(); }
  else                  { selectedPollsters.clear(); renderPollsterChips(); }
  rebuildChart();
}

// ─────────────────────────────────────────────
//  DATASETS
// ─────────────────────────────────────────────
function buildDatasets() {
  const datasets = [];
  for (const party of selectedParties) {
    const color = PARTY_COLORS[party] || '#888';
    for (const pollster of selectedPollsters) {
      const points = allData
        .filter(d => d.pollster === pollster && d.mandates[party] !== null)
        .map(d => ({ x: d.date, y: d.mandates[party], _row: d }))
        .sort((a, b) => (a.x < b.x ? -1 : 1));
      if (!points.length) continue;

      datasets.push({
        label:            `${party} – ${pollster}`,
        data:             points,
        borderColor:      color,
        backgroundColor:  hex2rgba(color, 0.07),
        borderWidth:      2,
        borderDash:       pollsterDash[pollster] || [],
        pointRadius:      (ctx) => (ctx.datasetIndex === hoveredIdx || ctx.datasetIndex === pinnedIdx) ? 4 : 0,
        pointHoverRadius: 6,
        pointHitRadius:   8,
        tension:          0.3,
        fill:             false,
        _baseColor:       color,
        _party:           party,
        _pollster:        pollster
      });
    }
  }
  return datasets;
}

// ─────────────────────────────────────────────
//  WEEKLY AVERAGE
// ─────────────────────────────────────────────
function toggleWeeklyAvg() {
  weeklyAvgMode = !weeklyAvgMode;
  const btn = document.getElementById('btn-weekly-avg');
  if (btn) btn.classList.toggle('active', weeklyAvgMode);
  rebuildChart();
}

function buildWeeklyAvgDatasets() {
  const datasets = [];
  for (const party of selectedParties) {
    const color = PARTY_COLORS[party] || '#888';

    // Group polls by weekKey (Sunday of that week) and pollster
    const weekMap = {}; // weekKey -> { pollster -> [values] }
    for (const d of allData) {
      if (!selectedPollsters.has(d.pollster)) continue;
      if (d.mandates[party] === null) continue;
      const dt  = new Date(d.date);
      const sun = new Date(dt);
      sun.setDate(dt.getDate() - dt.getDay()); // rewind to Sunday
      const weekKey = sun.toISOString().slice(0, 10);
      if (!weekMap[weekKey]) weekMap[weekKey] = {};
      if (!weekMap[weekKey][d.pollster]) weekMap[weekKey][d.pollster] = [];
      weekMap[weekKey][d.pollster].push(d.mandates[party]);
    }

    const points = Object.keys(weekMap).sort().map(weekKey => {
      // Average per pollster first (avoid double-counting same pollster's polls)
      const pollsterAvgs = Object.values(weekMap[weekKey])
        .map(vals => vals.reduce((a, b) => a + b, 0) / vals.length);
      // Then average across pollsters
      const avg = Math.round(
        pollsterAvgs.reduce((a, b) => a + b, 0) / pollsterAvgs.length * 10
      ) / 10;
      const dt = new Date(weekKey);
      const weekLabel = `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getFullYear()).slice(2)}`;
      return { x: weekKey, y: avg, _isAvg: true, _weekLabel: weekLabel };
    });

    if (!points.length) continue;

    datasets.push({
      label:            party,
      data:             points,
      borderColor:      color,
      backgroundColor:  hex2rgba(color, 0.07),
      borderWidth:      2.5,
      borderDash:       [],
      pointRadius:      (ctx) => (ctx.datasetIndex === hoveredIdx || ctx.datasetIndex === pinnedIdx) ? 4 : 0,
      pointHoverRadius: 6,
      pointHitRadius:   8,
      tension:          0,
      fill:             false,
      _baseColor:       color,
      _party:           party,
      _pollster:        null
    });
  }
  return datasets;
}

// ─────────────────────────────────────────────
//  ZOOM
// ─────────────────────────────────────────────
function fmtDateTs(ts) {
  const d = new Date(ts);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

function applyZoom(minTs, maxTs, startPx, endPx) {
  if (!chartInst) return;
  chartInst.options.scales.x.min = Math.min(minTs, maxTs);
  chartInst.options.scales.x.max = Math.max(minTs, maxTs);
  chartInst.update();
  zoomActive = true;
  const btn = document.getElementById('btn-reset-zoom');
  if (btn) btn.style.display = 'inline-block';

  // Show date-range tooltip briefly
  const canvas = document.getElementById('chart');
  const wrapEl = canvas.parentElement;
  const canvasRect = canvas.getBoundingClientRect();
  const wrapRect   = wrapEl.getBoundingClientRect();
  const offX = canvasRect.left - wrapRect.left;
  const offY = canvasRect.top  - wrapRect.top;
  const ca   = chartInst.chartArea;
  const centerPx = offX + (startPx + endPx) / 2;
  const tip = document.getElementById('zoom-tip');
  tip.textContent = `${fmtDateTs(Math.min(minTs, maxTs))} – ${fmtDateTs(Math.max(minTs, maxTs))}`;
  tip.style.display = 'block';
  tip.style.top  = Math.max(4, offY + ca.top - 30) + 'px';
  tip.style.left = '0';
  requestAnimationFrame(() => {
    tip.style.left = Math.max(4, centerPx - tip.offsetWidth / 2) + 'px';
  });
  setTimeout(() => { tip.style.display = 'none'; }, 2500);
}

function resetZoom() {
  if (!chartInst) return;
  delete chartInst.options.scales.x.min;
  delete chartInst.options.scales.x.max;
  chartInst.update();
  zoomActive = false;
  const btn = document.getElementById('btn-reset-zoom');
  if (btn) btn.style.display = 'none';
}

// ─────────────────────────────────────────────
//  HOVER (canvas-level segment detection)
// ─────────────────────────────────────────────
function distToSegment(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  if (dx === 0 && dy === 0) return Math.hypot(px - x1, py - y1);
  const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy)));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

function applyHoverStyles() {
  if (!chartInst) return;
  debugLog(`applyHoverStyles called. Hovered: ${hoveredIdx}, Pinned: ${pinnedIdx}`);
  const anyActive = hoveredIdx !== -1 || pinnedIdx !== -1;
  chartInst.data.datasets.forEach((ds, i) => {
    const isHighlighted = anyActive && (i === hoveredIdx || i === pinnedIdx);
    ds.borderColor = (!anyActive || isHighlighted) ? ds._baseColor : hex2rgba(ds._baseColor, 0.06);
    ds.borderWidth = isHighlighted ? 3.5 : 2;
  });
  chartInst.update('none');
}

// ─────────────────────────────────────────────
//  INTERACTIONS  (hover, pin, drag-to-zoom)
// ─────────────────────────────────────────────

function bindCanvasHover(canvas) {
  if (hoverAbort) hoverAbort.abort();
  hoverAbort = new AbortController();
  const signal = hoverAbort.signal;

  let dragStartX  = null;
  let dragStartTs = null;
  let isDragging  = false;
  let mdOnLine    = false;
  let mdLineIdx   = -1;
  let docMoveHandler = null;
  let docUpHandler   = null;

  // Clean up document listeners if the chart is rebuilt while dragging
  signal.addEventListener('abort', () => {
    if (docMoveHandler) document.removeEventListener('mousemove', docMoveHandler);
    if (docUpHandler)   document.removeEventListener('mouseup',   docUpHandler);
    document.getElementById('zoom-select').style.display = 'none';
    canvas.style.cursor = '';
  });

  function nearestDataset(mx, my, threshold) {
    let idx = -1, minD = threshold;
    chartInst.data.datasets.forEach((ds, i) => {
      const meta = chartInst.getDatasetMeta(i);
      if (!meta.visible) return;
      for (let j = 0; j < meta.data.length - 1; j++) {
        const p1 = meta.data[j], p2 = meta.data[j + 1];
        const d = distToSegment(mx, my, p1.x, p1.y, p2.x, p2.y);
        if (d < minD) { minD = d; idx = i; }
      }
    });
    return idx;
  }

  function updateZoomRect(clientX) {
    const ca = chartInst.chartArea;
    const canvasRect = canvas.getBoundingClientRect();
    const wrapRect   = canvas.parentElement.getBoundingClientRect();
    const offX = canvasRect.left - wrapRect.left;
    const offY = canvasRect.top  - wrapRect.top;
    const rawMx      = clientX - canvasRect.left;
    const clampedEnd = Math.max(ca.left, Math.min(ca.right, rawMx));
    const clampedStart = Math.max(ca.left, Math.min(ca.right, dragStartX));
    const left  = offX + Math.min(clampedStart, clampedEnd);
    const right = offX + Math.max(clampedStart, clampedEnd);
    const zs = document.getElementById('zoom-select');
    zs.style.left    = left + 'px';
    zs.style.width   = Math.max(0, right - left) + 'px';
    zs.style.top     = (offY + ca.top) + 'px';
    zs.style.height  = (ca.bottom - ca.top) + 'px';
    zs.style.display = 'block';
  }

  function finishDrag(clientX) {
    document.removeEventListener('mousemove', docMoveHandler);
    document.removeEventListener('mouseup',   docUpHandler);
    docMoveHandler = null; docUpHandler = null;
    canvas.style.cursor = '';
    document.getElementById('zoom-select').style.display = 'none';

    if (isDragging) {
      const ca   = chartInst.chartArea;
      const rawMx = clientX - canvas.getBoundingClientRect().left;
      // If released at or beyond right edge, snap to scale's current max
      const endTs = (rawMx >= ca.right)
        ? chartInst.scales.x.max
        : chartInst.scales.x.getValueForPixel(rawMx);
      const endPx = Math.min(ca.right, rawMx);
      applyZoom(dragStartTs, endTs, dragStartX, endPx);
    }
    dragStartX = null; dragStartTs = null; isDragging = false;
  }

  canvas.addEventListener('mousedown', e => {
    if (!chartInst || e.button !== 0) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const idx = nearestDataset(mx, my, 10);
    if (idx !== -1) {
      mdOnLine = true; mdLineIdx = idx;
    } else {
      mdOnLine = false; mdLineIdx = -1;
      dragStartX  = mx;
      dragStartTs = chartInst.scales.x.getValueForPixel(mx);

      docMoveHandler = ev => {
        if (!isDragging) {
          const curMx = ev.clientX - canvas.getBoundingClientRect().left;
          if ((curMx - dragStartX) > 10) isDragging = true;
        }
        if (isDragging) { canvas.style.cursor = 'col-resize'; updateZoomRect(ev.clientX); }
      };
      docUpHandler = ev => {
        const wasDragging = isDragging;
        finishDrag(ev.clientX);
        if (!wasDragging && pinnedIdx !== -1) {
          debugLog(`Unpinning dataset ${pinnedIdx} due to click outside`);
          pinnedIdx = -1;
          applyHoverStyles();
        }
      };
      document.addEventListener('mousemove', docMoveHandler);
      document.addEventListener('mouseup',   docUpHandler);
    }
  }, { signal });

  // Pin/unpin on mouseup when click was on a line
  canvas.addEventListener('mouseup', e => {
    if (!chartInst || !mdOnLine) { mdOnLine = false; mdLineIdx = -1; return; }
    debugLog(`Click detected on dataset ${mdLineIdx}`);
    if (pinnedIdx === mdLineIdx) {
      debugLog(`Unpinning dataset ${mdLineIdx}`); pinnedIdx = -1;
    } else {
      debugLog(`Pinning dataset ${mdLineIdx}`);   pinnedIdx = mdLineIdx;
    }
    debugLog(`Applying hover styles. Hovered: ${hoveredIdx}, Pinned: ${pinnedIdx}`);
    applyHoverStyles();
    mdOnLine = false; mdLineIdx = -1;
  }, { signal });

  canvas.addEventListener('mousemove', e => {
    if (!chartInst || dragStartX !== null) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const newIdx = nearestDataset(mx, my, 8);
    if (newIdx === hoveredIdx) return;
    hoveredIdx = newIdx;
    debugLog(`Hover changed. New hover index: ${hoveredIdx}, Pinned: ${pinnedIdx}`);
    applyHoverStyles();
  }, { signal });

  canvas.addEventListener('mouseleave', () => {
    if (dragStartX !== null) return; // drag tracked on document — don't cancel
    canvas.style.cursor = '';
    if (hoveredIdx === -1) return;
    hoveredIdx = -1;
    debugLog(`Mouse left. Hover index reset to: ${hoveredIdx}, Pinned: ${pinnedIdx}`);
    applyHoverStyles();
  }, { signal });

  canvas.addEventListener('dblclick', () => resetZoom(), { signal });
}

// ─────────────────────────────────────────────
//  CHART
// ─────────────────────────────────────────────
function createChart(datasets) {
  const canvas = document.getElementById('chart');
  chartInst = new Chart(canvas.getContext('2d'), {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 250 },
      interaction: { mode: 'point', intersect: true },
      plugins: {
        legend: { display: false },
        tooltip: {
          rtl: true,
          textDirection: 'rtl',
          backgroundColor: 'rgba(10,13,22,0.96)',
          borderColor: '#2d3a56',
          borderWidth: 1,
          titleColor: '#cdd5e0',
          bodyColor:  '#8a97b5',
          titleFont:  { size: 12 },
          bodyFont:   { size: 12 },
          padding: 11,
          filter(item) { 
            // Show tooltip for pinned dataset or hovered dataset
            return item.datasetIndex === hoveredIdx || item.datasetIndex === pinnedIdx; 
          },
          callbacks: {
            title(items) {
              if (!items || items.length === 0) return 'תאריך לא זמין';
              const item = items[0];
              if (item?.raw?._isAvg) return `שבוע ${item.raw._weekLabel}`;
              if (item?.raw?._row?.displayDate) return item.raw._row.displayDate;
              return item?.label || 'תאריך לא זמין';
            },
            label(item) {
              const ds = item.dataset;
              if (item.raw?._isAvg) {
                return ` ${ds._party}: ${item.raw.y} מנדטים (ממוצע שבועי)`;
              }
              const row = item.raw?._row;
              const med = row?.media ? ` (${row.media})` : '';
              return ` ${ds._party}: ${item.raw?.y ?? '?'} מנדטים — ${ds._pollster}${med}`;
            },
            labelColor(item) {
              const c = item.dataset._baseColor;
              return { borderColor: c, backgroundColor: c };
            }
          }
        }
      },
      scales: {
        x: {
          type: 'time',
          time: {
            displayFormats: {
              day:     'dd/MM',
              week:    'dd/MM',
              month:   "MMM ''yy",
              quarter: "QQQ ''yy",
              year:    'yyyy'
            }
          },
          border: { display: false },
          grid:   { color: '#1a2038' },
          ticks:  { color: '#6b7898', maxTicksLimit: 14, maxRotation: 0 }
        },
        y: {
          title: {
            display: true,
            text: 'מנדטים',
            color: '#6b7898',
            font: { size: 11 }
          },
          border: { display: false },
          grid:   { color: '#1a2038' },
          ticks:  { color: '#6b7898', stepSize: 5 },
          min: 0
        }
      }
    },
    plugins: []
  });
  
}

function rebuildChart() {
  const datasets = weeklyAvgMode ? buildWeeklyAvgDatasets() : buildDatasets();
  hoveredIdx = -1;
  pinnedIdx  = -1;
  zoomActive = false;
  const btnZ = document.getElementById('btn-reset-zoom');
  if (btnZ) btnZ.style.display = 'none';

  const canvas = document.getElementById('chart');
  const noData = document.getElementById('no-data');

  if (chartInst) { chartInst.destroy(); chartInst = null; }

  if (!datasets.length) {
    canvas.style.display = 'none';
    noData.classList.remove('hidden');
    return;
  }

  noData.classList.add('hidden');
  canvas.style.display = 'block';
  bindCanvasHover(canvas);
  createChart(datasets);
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
async function init() {
  try {
    const rows = await loadCSV();
    
    // If we got empty data, show a message but don't fail completely
    if (!rows || rows.length < 2) {
      console.warn('No data loaded from CSV. This is expected when running locally without a web server.');
      document.getElementById('loading').textContent = 'הנתונים לא נטענו - יש להריץ את האפליקציה דרך שרת אינטרנט';
      // Still try to initialize with empty data to avoid complete failure
      allData = [];
    } else {
      allData = parseRows(rows);
    }

    // Unique pollsters, sorted by frequency
    const freq = {};
    allData.forEach(d => { freq[d.pollster] = (freq[d.pollster] || 0) + 1; });
    allPollsters = [...new Set(allData.map(d => d.pollster))]
      .sort((a, b) => freq[b] - freq[a]);
    allPollsters.forEach((p, i) => { pollsterDash[p] = DASH_PATTERNS[i % DASH_PATTERNS.length]; });

    // Default selections
    PARTIES.forEach(p => { if (DEFAULT_PARTIES.has(p)) selectedParties.add(p); });
    allPollsters.forEach(p => selectedPollsters.add(p));

    // Last-update badge
    const lastDate = allData
      .map(d => d.date).sort()
      .at(-1);
    const lastRow = allData.find(d => d.date === lastDate);
    if (lastRow) document.getElementById('badge').textContent = `עדכון: ${lastRow.displayDate}`;

    renderPartyChips();
    renderPollsterChips();

    document.getElementById('loading').classList.add('hidden');
    rebuildChart();
  } catch (err) {
    document.getElementById('loading').textContent = 'שגיאה בטעינת הנתונים';
    console.error('Error loading data:', err);
  }
}

init();
</script>
